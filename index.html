<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/logo.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Онлайн Витрина</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet" />
  <style>
    /* Встроенный прелоадер — виден сразу до монтирования Vue */
    #app-preloader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: #ffffff;
      font-family: 'Manrope', system-ui, sans-serif;
      transition: opacity 0.5s ease;
    }

    #app-preloader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #app-preloader .preloader-ring {
      width: 32px;
      height: 32px;
      border: 2.5px solid rgba(0, 0, 0, 0.1);
      border-top-color: #000000;
      border-radius: 50%;
      animation: preloader-spin 0.8s linear infinite;
    }

    #app-preloader .preloader-logo {
      width: 76px;
      height: 76px;
      object-fit: contain;
      border-radius: 50%;
      overflow: hidden;
    }

    #app-preloader .preloader-name {
      font-size: 22px;
      font-weight: 800;
      color: #111;
      max-width: 260px;
      text-align: center;
      line-height: 1.2;
    }

    @keyframes preloader-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>

<body>
  <div id="app">
    <!-- Native inline preloader — гарантированно виден сразу -->
    <div id="app-preloader">
      <img src="/logo.png" alt="Alwib" class="preloader-logo" />
      <div class="preloader-name">Онлайн Витрина</div>
      <div class="preloader-ring"></div>
    </div>
  </div>
